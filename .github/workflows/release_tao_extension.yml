# Make an extension release after merging to develop branch

name: Release Tao extension

on:
  pull_request:
    branches:
      - develop
    types: [closed]

  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Branch to release from (use release branch for backports)'
        required: false
        default: develop
        type: string
      release_version:
        description: 'Release version (e.g. 1.2.3). Leave empty for auto semver.'
        required: false
        type: string
      build_fe:
        description: 'Frontend build'
        required: true
        type: choice
        options: [auto, yes, no]
        default: auto
      build_locale:
        description: 'Locale build'
        required: true
        type: choice
        options: [auto, yes, no]
        default: auto
      backport:
        description: 'Backport release (never merges to main)'
        required: false
        default: false
        type: boolean

jobs:
  auto-release:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    name: TAO extension release
    uses: oat-sa/ci-pipelines/.github/workflows/reuse-auto-release-tao-extension.yaml@master
    with:
      ENABLED: true
      TAO_EXTENSION_NAME: qtiItemPci
      SLACK_NOTIFICATION: true
      TAO_BUILD_FE: ${{ inputs.build_fe }}
      TAO_BUILD_LOCALE: ${{ inputs.build_locale }}
      RELEASE_REF: ${{ github.event.inputs.release_branch || 'develop' }}
      RELEASE_VERSION: ${{ github.event.inputs.release_version || '' }}
      BACKPORT: ${{ github.event.inputs.backport == 'true' }}
    secrets: inherit
    